name: Build Feather

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: make deps

      - name: Build IPA
        run: make Feather CODE_SIGNING_ALLOWED=NO

      - name: List packages
        run: ls -la packages/ || echo "packages folder missing"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Feather.ipa
          path: packages/Feather.ipa
